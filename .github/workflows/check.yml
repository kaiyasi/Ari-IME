name: Check

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: ${{ matrix.build_type }} Build (${{ matrix.compiler.name }})
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]
        compiler:
          - name: GCC
            cc: gcc
            cxx: g++
          - name: Clang
            cc: clang
            cxx: clang++

    steps:
      - name: Cache pacman packages
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: ${{ runner.os }}-arch-pacman-${{ hashFiles('.github/workflows/check.yml') }}
          restore-keys: |
            ${{ runner.os }}-arch-pacman-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /github/home/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ matrix.compiler.name }}-${{ matrix.build_type }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ matrix.compiler.name }}-${{ matrix.build_type }}-
            ${{ runner.os }}-ccache-${{ matrix.compiler.name }}-
            ${{ runner.os }}-ccache-

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm \
            ccache \
            clang \
            cmake \
            extra-cmake-modules \
            fcitx5 \
            gcc \
            git \
            hicolor-icon-theme \
            libchewing \
            pkgconf

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run release checks
        run: >
          INPUTER_CHECK_MODE=release
          INPUTER_BUILD_TYPE=${{ matrix.build_type }}
          INPUTER_BUILD_DIR=build-${{ matrix.compiler.name }}-${{ matrix.build_type }}
          INPUTER_CC=${{ matrix.compiler.cc }}
          INPUTER_CXX=${{ matrix.compiler.cxx }}
          INPUTER_CXX_COMPILER_LAUNCHER=ccache
          scripts/check.sh

  sanitize:
    name: Sanitizers
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Cache pacman packages
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: ${{ runner.os }}-arch-pacman-${{ hashFiles('.github/workflows/check.yml') }}
          restore-keys: |
            ${{ runner.os }}-arch-pacman-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /github/home/.cache/ccache
          key: ${{ runner.os }}-ccache-sanitize-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-sanitize-
            ${{ runner.os }}-ccache-

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm \
            ccache \
            cmake \
            extra-cmake-modules \
            fcitx5 \
            gcc \
            git \
            hicolor-icon-theme \
            libchewing \
            pkgconf

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run sanitizer checks
        run: INPUTER_CHECK_MODE=sanitize INPUTER_CXX_COMPILER_LAUNCHER=ccache scripts/check.sh

  package:
    name: Package Simulation
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Cache pacman packages
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: ${{ runner.os }}-arch-pacman-${{ hashFiles('.github/workflows/check.yml') }}
          restore-keys: |
            ${{ runner.os }}-arch-pacman-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /github/home/.cache/ccache
          key: ${{ runner.os }}-ccache-package-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-package-
            ${{ runner.os }}-ccache-

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm \
            ccache \
            cmake \
            extra-cmake-modules \
            fcitx5 \
            gcc \
            git \
            hicolor-icon-theme \
            libchewing \
            pkgconf

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run package simulation
        run: INPUTER_CHECK_MODE=package CMAKE_CXX_COMPILER_LAUNCHER=ccache scripts/check.sh
