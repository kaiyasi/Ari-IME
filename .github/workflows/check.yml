name: Check

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  release:
    name: ${{ matrix.build_type }} Build (${{ matrix.compiler.name }})
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]
        compiler:
          - name: GCC
            cc: gcc
            cxx: g++
          - name: Clang
            cc: clang
            cxx: clang++

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            clang \
            cmake \
            extra-cmake-modules \
            fcitx5 \
            gcc \
            git \
            hicolor-icon-theme \
            libchewing \
            pkgconf

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run release checks
        run: >
          INPUTER_CHECK_MODE=release
          INPUTER_BUILD_TYPE=${{ matrix.build_type }}
          INPUTER_BUILD_DIR=build-${{ matrix.compiler.name }}-${{ matrix.build_type }}
          INPUTER_CC=${{ matrix.compiler.cc }}
          INPUTER_CXX=${{ matrix.compiler.cxx }}
          scripts/check.sh

  sanitize:
    name: Sanitizers
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            cmake \
            extra-cmake-modules \
            fcitx5 \
            gcc \
            git \
            hicolor-icon-theme \
            libchewing \
            pkgconf

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run sanitizer checks
        run: INPUTER_CHECK_MODE=sanitize scripts/check.sh

  package:
    name: Package Simulation
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            cmake \
            extra-cmake-modules \
            fcitx5 \
            gcc \
            git \
            hicolor-icon-theme \
            libchewing \
            pkgconf

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run package simulation
        run: INPUTER_CHECK_MODE=package scripts/check.sh
